name: Refresh Google Maps Ratings

on:
  schedule:
    # Every Sunday at 02:00 UTC — incremental (missing records only)
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      datasets:
        description: "Datasets to scrape (space-separated: global japan love)"
        required: false
        default: "global japan love"
      missing_only:
        description: "Only scrape records not yet in the ratings cache"
        required: false
        default: "true"
        type: boolean

permissions:
  contents: write

concurrency:
  group: ratings-refresh
  cancel-in-progress: true

jobs:
  refresh-ratings:
    runs-on: ubuntu-latest
    timeout-minutes: 180   # full run can take up to 2 hours for ~2500 records

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Scrape ratings (incremental)
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          DATASETS="${{ github.event.inputs.datasets || 'global japan love' }}"
          MISSING_FLAG="${{ github.event.inputs.missing_only != 'false' && '--missing-only' || '' }}"
          python3 scripts/scrape_google_ratings_playwright.py \
            --datasets $DATASETS \
            $MISSING_FLAG \
            --concurrency 2

      - name: Commit updated ratings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/google-maps-ratings.json
          if git diff --cached --quiet; then
            echo "No ratings changes."
            exit 0
          fi
          COUNT=$(python3 -c "import json; print(len(json.load(open('data/google-maps-ratings.json'))))")
          git commit -m "chore: refresh google maps ratings ($COUNT records)"
          git push origin main
