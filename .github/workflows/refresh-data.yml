name: Refresh Data

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PDF tools
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Sync Japan dining
        env:
          PYTHONUNBUFFERED: "1"
        run: /usr/bin/time -p python3 scripts/sync_japan_mvp.py

      - name: Sync Plat Stay
        env:
          PYTHONUNBUFFERED: "1"
          GEOAPIFY_API_KEY: ${{ secrets.GEOAPIFY_API_KEY }}
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
        run: /usr/bin/time -p python3 scripts/sync_plat_stay.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes detected."
            exit 0
          fi
          git commit -m "chore: refresh explorer data"
          git push origin main
