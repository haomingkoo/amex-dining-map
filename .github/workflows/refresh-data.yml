name: Refresh Data

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: data-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PDF tools
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Sync Japan dining
        env:
          PYTHONUNBUFFERED: "1"
        run: /usr/bin/time -p python3 scripts/sync_japan_mvp.py

      - name: Build Japan Dining source alert
        id: japan_alert
        run: |
          python3 scripts/source_change_alert.py \
            --program "Japan Dining" \
            --meta data/japan-dining-source.json \
            --data data/japan-restaurants.json \
            --output /tmp/japan-dining-alert.md \
            --changelog data/changelog-japan-dining.md

      - name: Sync Plat Stay
        env:
          PYTHONUNBUFFERED: "1"
          GEOAPIFY_API_KEY: ${{ secrets.GEOAPIFY_API_KEY }}
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
        run: /usr/bin/time -p python3 scripts/sync_plat_stay.py

      - name: Build Plat Stay source alert
        id: plat_stay_alert
        run: |
          python3 scripts/source_change_alert.py \
            --program "Plat Stay" \
            --meta data/plat-stay-source.json \
            --data data/plat-stays.json \
            --output /tmp/plat-stay-alert.md \
            --changelog data/changelog-plat-stay.md

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes detected."
            exit 0
          fi
          git commit -m "chore: refresh explorer data"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push failed on attempt ${attempt}; retrying after remote sync."
            sleep $((attempt * 5))
          done
          exit 1

      - name: Open Plat Stay alert issue
        if: steps.plat_stay_alert.outputs.alert_required == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash scripts/open_source_alert_issue.sh \
            "Plat Stay source changed: review required" \
            /tmp/plat-stay-alert.md \
            plat-stay

      - name: Open Japan Dining alert issue
        if: steps.japan_alert.outputs.alert_required == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash scripts/open_source_alert_issue.sh \
            "Japan Dining source changed: review required" \
            /tmp/japan-dining-alert.md \
            japan-dining
