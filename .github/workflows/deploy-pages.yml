name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Audit map coordinates
        run: python3 scripts/audit_coordinates.py

      - name: Audit content provenance
        run: python3 scripts/audit_content_provenance.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Stage Static Site
        run: |
          mkdir -p site
          cp -R web/. site/
          cp -R data site/data
          cp .nojekyll site/
          cp CNAME site/
          short_sha="${GITHUB_SHA::7}"
          sed -i "s/?v=dev/?v=${short_sha}/g" site/index.html

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
