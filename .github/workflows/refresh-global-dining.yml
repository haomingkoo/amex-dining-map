name: Refresh Global Dining Data

on:
  schedule:
    # Runs on the 1st of every month at 01:00 UTC (before descriptions at 02:00)
    - cron: "0 1 1 * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run scraper
        run: python3 scripts/scrape_global_dining.py

      - name: Verify against official Amex API
        run: python3 scripts/verify_global_dining_official.py --all

      - name: Audit map coordinates
        run: python3 scripts/audit_coordinates.py

      - name: Build Global Dining source alert
        id: global_alert
        run: |
          python3 scripts/source_change_alert.py \
            --program "Global Dining" \
            --meta data/global-dining-source.json \
            --data data/global-restaurants.json \
            --output /tmp/global-dining-alert.md

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/global-restaurants.json data/global-dining-source.json
          if git diff --staged --quiet; then
            echo "No data changes detected."
            exit 0
          fi
          git commit -m "chore: monthly refresh of global dining data"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push failed on attempt ${attempt}; retrying after remote sync."
            sleep $((attempt * 5))
          done
          exit 1

      - name: Open Global Dining alert issue
        if: steps.global_alert.outputs.alert_required == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash scripts/open_source_alert_issue.sh \
            "Global Dining source changed: review required" \
            /tmp/global-dining-alert.md \
            global-dining
