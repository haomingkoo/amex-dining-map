name: Refresh Global Dining Data

on:
  schedule:
    # Runs on the 1st of every month at 01:00 UTC (before descriptions at 02:00)
    - cron: "0 1 1 * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run scraper
        run: python3 scripts/scrape_global_dining.py

      - name: Verify against official Amex API
        run: python3 scripts/verify_global_dining_official.py --all

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/global-restaurants.json data/global-dining-source.json
          git diff --staged --quiet || git commit -m "chore: monthly refresh of global dining data"
          git push
