name: Refresh Global Dining Data

on:
  schedule:
    # Runs on the 1st of every month at 01:00 UTC (before descriptions at 02:00)
    - cron: "0 1 1 * *"
  workflow_dispatch:

concurrency:
  group: global-dining-refresh
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run scraper
        run: python3 scripts/scrape_global_dining.py

      - name: Verify against official Amex API
        run: python3 scripts/verify_global_dining_official.py --all

      - name: Audit map coordinates
        run: python3 scripts/audit_coordinates.py

      - name: Audit content provenance
        run: python3 scripts/audit_content_provenance.py

      - name: Build Global Dining source alert
        id: global_alert
        run: |
          python3 scripts/source_change_alert.py \
            --program "Global Dining" \
            --meta data/global-dining-source.json \
            --data data/global-restaurants.json \
            --output /tmp/global-dining-alert.md \
            --changelog data/changelog-global-dining.md

      - name: Commit updated data
        env:
          COMMIT_MESSAGE: "chore: monthly refresh of global dining data"
          MUST_STAGE: |
            data/global-restaurants.json
            data/global-dining-source.json
            data/global-dining-geocode-cache.json
            data/changelog-global-dining.md
          KEEP_LOCAL_ON_CONFLICT: |
            data/global-dining-geocode-cache.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          bash scripts/commit_and_push.sh

      - name: Open Global Dining alert issue
        if: steps.global_alert.outputs.alert_required == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash scripts/open_source_alert_issue.sh \
            "Global Dining source changed: review required" \
            /tmp/global-dining-alert.md \
            global-dining
