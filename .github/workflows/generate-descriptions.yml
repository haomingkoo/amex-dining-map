name: Generate AI Descriptions

on:
  workflow_dispatch:
    inputs:
      min_words:
        description: "Regenerate descriptions shorter than N words (default: 20)"
        required: false
        default: "20"
      country:
        description: "Limit to a specific country (leave blank for all)"
        required: false
        default: ""
      batch_size:
        description: "Batch size per Groq request (default: 20)"
        required: false
        default: "20"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run description generator
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          ARGS="--min-words ${{ github.event.inputs.min_words }} --batch-size ${{ github.event.inputs.batch_size }}"
          if [ -n "${{ github.event.inputs.country }}" ]; then
            ARGS="$ARGS --country \"${{ github.event.inputs.country }}\""
          fi
          eval python3 scripts/generate_global_descriptions.py $ARGS

      - name: Commit updated descriptions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/global-restaurants.json
          git diff --staged --quiet || git commit -m "chore: regenerate AI descriptions for global restaurants"
          git push
